name: PST Docker Image CI

on:
  push:
    tags:
      - "v*.*.*"
env:
  IMAGE_NAME: palworld-server-tool
  DOCKER_REGISTRY: jokerwho
jobs:
  build-image:
    runs-on: ubuntu-latest
    env:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_PWD: ${{ secrets.DOCKER_HUB_PWD }}

    outputs:
      tags: ${{ steps.output-id.outputs.v }}

    steps:
      - uses: actions/checkout@v4
      - id: output-id
        run: |
          VERSION=prod
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "v=${VERSION}" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login Docker Hub
        if: ${{ env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_PWD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ env.DOCKER_HUB_PWD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          push: ${{ env.DOCKER_HUB_USERNAME != '' && env.DOCKER_HUB_PWD != '' }}
          build-args: version=v${{ steps.output-id.outputs.v }}
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.output-id.outputs.v }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
